<!DOCTYPE html>
<!--
  MOTION Scroll DUI - Single file: menu + notifications + keybind prompt + text input.
  - Notifications: bottom-right, custom sound from NOTIFICATION_SOUND_URL.
  - Keybind: shown on first inject/start; press any key (shown below), confirm with Enter only.
  - Text input: Lua sends showTextInput; modal has Cancel, Escape to close, paste allowed, mouse enabled.
  - Lua sends messages via MachoSendDuiMessage(dui, json). See IMPLEMENTATION.txt for payloads.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>MOTION – Scroll Menu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap');

:root {
  --bg: rgba(14, 14, 18, 0.8);
  --bg-soft: rgba(10, 10, 14, 0.55);
  --accent: #a03cf7;
  --accent-rgb: 160, 60, 247;
  --accent-dim: rgba(160, 60, 247, 0.3);
  --edge: rgba(255, 255, 255, 0.07);
  --text: #e8e8e8;
  --scale: 1.06;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; user-select: none; }

#bg {
  position: fixed;
  inset: 0;
  background: url('https://files.catbox.moe/cplsay.png') center/cover no-repeat;
  z-index: 0;
}
body.in-game #bg { display: none; }

/* Panel on RIGHT side; visible by default in browser */
#panel {
  position: fixed;
  top: 50%;
  right: 1.5vw;
  left: auto;
  transform: translateY(-50%) scale(var(--scale));
  transform-origin: right center;
  width: 20vw;
  min-width: 340px;
  max-width: 420px;
  background: var(--bg);
  border: 1px solid var(--edge);
  border-radius: 5px;
  box-shadow: 0 10px 36px rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  overflow: hidden;
  z-index: 100;
  display: none;               /* hidden by default */
  flex-direction: column;
}
body.in-game #panel { display: none; }
body.in-game #panel.visible { display: flex; }  /* only show when Motion DUI explicitly opens */

/* Banner – same as fixed_index: full width, fixed vw height, cover fill */
.banner {
  position: relative;
  width: 100%;
  height: 4.2vw;
  min-height: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 0.052vw solid rgba(0,0,0,0.5);
  border-top-left-radius: 0.4167vw;
  border-top-right-radius: 0.4167vw;
  border-bottom: 1px solid var(--edge);
  overflow: hidden;
}
.banner img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}
.banner .banner-text { color: var(--accent); font-weight: 600; font-size: 0.95rem; letter-spacing: 0.06em; z-index: 1; }

/* Categories row */
.categories {
  display: flex;
  align-items: center;
  padding: 0 0.65vw;
  height: 1.35vw;
  min-height: 28px;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--edge);
  gap: 0.5vw;
}
.category {
  font-size: 0.52vw;
  font-weight: 700;
  color: rgba(255,255,255,0.92);
}
.category.active { color: var(--accent); }

.tabs-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--edge);
}
.tabs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0;
  max-height: 14vw;
  position: relative;
}
.tabs::-webkit-scrollbar { width: 0; }
.tab {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  min-height: 1.72vw;
  padding: 0 0.65vw;
  font-size: 0.65vw;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 1;
}
.tab .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tab .control { display: flex; align-items: center; gap: 0.35vw; flex-shrink: 0; }
.highlight {
  position: absolute;
  left: 0;
  width: 100%;
  background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.45), rgba(var(--accent-rgb), 0.22));
  border: 1px solid rgba(var(--accent-rgb), 0.5);
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.25);
  z-index: 0;
  transition: top 0.15s ease, height 0.15s ease;
}

/* Checkbox – pill with sliding dot */
.cb {
  width: 2vw;
  min-width: 28px;
  height: 0.95vw;
  min-height: 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.18);
  position: relative;
  flex-shrink: 0;
}
.cb.on { background: rgba(var(--accent-rgb), 0.88); border-color: rgba(255,255,255,0.22); box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.3); }
.cb .dot {
  position: absolute;
  left: 0.2vw;
  top: 50%;
  transform: translateY(-50%);
  width: 0.5vw;
  height: 0.5vw;
  min-width: 8px;
  min-height: 8px;
  background: #fff;
  border-radius: 50%;
  transition: left 0.2s ease;
}
.cb.on .dot { left: 1.15vw; }

/* Slider */
.slider {
  width: 2.3vw;
  min-width: 32px;
  height: 0.25vw;
  min-height: 4px;
  background: #1e1e1e;
  border-radius: 0.26vw;
  position: relative;
  overflow: hidden;
}
.slider .fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--accent);
  border-radius: 0.26vw;
  transition: width 0.15s ease;
}
.slider .thumb {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 0.45vw;
  height: 0.45vw;
  min-width: 8px;
  min-height: 8px;
  background: #e1e1e1;
  border-radius: 50%;
}

/* Scrollable value */
.scrollable-val {
  display: flex;
  align-items: center;
  gap: 0.25vw;
  font-size: 0.62vw;
  color: #fff;
}
.scrollable-val span:nth-child(2) { min-width: 2.5vw; text-align: center; }
.tab .inputbox-hint { font-size: 0.6vw; color: rgba(255,255,255,0.55); max-width: 8vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Divider */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4vw;
  width: 92%;
  margin: 0 auto;
}
.divider .line { flex: 1; height: 1px; background: rgba(255,255,255,0.3); border-radius: 2px; }
.divider .label { font-size: 0.6vw; color: rgba(255,255,255,0.7); white-space: nowrap; }

.tab i.fa-angle-right { font-size: 0.6vw; color: rgba(255,255,255,0.8); }

/* Footer */
.footer {
  padding: 0.4vw 0.6vw;
  min-height: 1.4vw;
  background: #000;
  border-radius: 0 0 0.35vw 0.35vw;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.48vw;
  color: var(--accent);
}

/* ========== NOTIFICATIONS (bottom-right) ========== */
#notifications {
  position: fixed;
  bottom: 2vh;
  right: 1.5vw;
  display: flex;
  flex-direction: column;
  gap: 0.6vh;
  max-width: 20vw;
  z-index: 500;
  pointer-events: none;
}
.notif {
  background: #0c0c10;
  border-left: 3px solid var(--accent);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  padding: 0.5vh 0.7vw;
  border-radius: 4px;
  color: var(--text);
  font-size: clamp(10px, 0.5vw, 13px);
  opacity: 0;
  transform: translateX(100%);
  transition: opacity 0.22s ease, transform 0.3s ease;
  pointer-events: auto;
}
.notif.show { opacity: 1; transform: translateX(0); }
.notif.exit { opacity: 0; transform: translateX(50%); }
.notif .notif-title { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
.notif .notif-desc { color: #999; font-size: 0.9em; }
.notif .notif-bar { position: absolute; left: 0; right: 0; bottom: 0; height: 2px; background: var(--accent); transform-origin: left; }
@keyframes notif-shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }

/* ========== KEYBIND PROMPT (shown on start / when Lua requests) ========== */
#keybind-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
#keybind-overlay.show {
  opacity: 1;
  visibility: visible;
}
#keybind-box {
  background: #0c0c10;
  border: 1px solid var(--edge);
  border-radius: 8px;
  padding: 1.2vw 1.5vw;
  min-width: 220px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
#keybind-box .keybind-title { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 0.8rem; }
#keybind-box .keybind-key { font-size: 1.1rem; font-weight: 600; color: var(--accent); min-height: 1.4rem; margin-bottom: 0.4rem; }
#keybind-box .keybind-hint { font-size: 0.7rem; color: #666; }

/* ========== TEXT INPUT MODAL (mouse enabled, Cancel, Escape, paste) ========== */
#textinput-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s ease, visibility 0.2s ease;
  pointer-events: none;
}
#textinput-overlay.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}
#textinput-box {
  background: #0c0c10;
  border: 1px solid var(--edge);
  border-radius: 8px;
  padding: 1rem 1.2rem;
  min-width: 280px;
  max-width: 90vw;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
#textinput-box .textinput-title { font-size: 0.8rem; color: #fff; margin-bottom: 0.6rem; }
#textinput-box #textinput-field {
  width: 100%;
  padding: 0.5rem 0.6rem;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--edge);
  border-radius: 4px;
  color: #fff;
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
  box-sizing: border-box;
}
#textinput-box #textinput-field:focus { outline: none; border-color: var(--accent); }
#textinput-box .textinput-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; }
#textinput-box .textinput-buttons button {
  padding: 0.4rem 0.8rem;
  border-radius: 4px;
  font-size: 0.8rem;
  cursor: pointer;
  border: 1px solid var(--edge);
  background: rgba(255,255,255,0.06);
  color: #fff;
}
#textinput-box .textinput-buttons button:hover { background: rgba(255,255,255,0.1); }
#textinput-box .textinput-buttons button.confirm { background: rgba(var(--accent-rgb), 0.4); border-color: var(--accent); color: #fff; }

/* ========== CHOICE OVERLAY (Macho / Motion DUI on injection) ========== */
#choice-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
#choice-overlay.show {
  opacity: 1;
  visibility: visible;
}
#choice-box {
  background: var(--bg);
  border: 1px solid var(--edge);
  border-radius: 8px;
  padding: 1.5rem 2rem;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
#choice-box .choice-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 1rem;
}
#choice-box .choice-buttons {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
#choice-box .choice-btn {
  padding: 0.6rem 1.2rem;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--edge);
  background: rgba(255,255,255,0.06);
  color: #fff;
  transition: background 0.15s, border-color 0.15s;
}
#choice-box .choice-btn:hover { background: rgba(255,255,255,0.12); }
#choice-box .choice-btn.primary { background: rgba(var(--accent-rgb), 0.35); border-color: var(--accent); color: #fff; }
#choice-box .choice-btn.primary:hover { background: rgba(var(--accent-rgb), 0.5); }

/* ========== MOTION LOGO (bottom-left, always when Motion DUI active) ========== */
#motion-logo {
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  width: 80px;
  height: auto;
  z-index: 400;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
  pointer-events: none;
}
#motion-logo.show {
  opacity: 1;
  visibility: visible;
}
#motion-logo img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="panel">
    <div class="banner">
      <img id="banner-img" src="https://raw.githubusercontent.com/MotionLua/motion-banners/refs/heads/main/theme5.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.classList.add('banner-text'); this.nextElementSibling.style.display='inline';">
      <span id="banner-text" style="display:none;">MOTION</span>
    </div>
    <div class="categories" id="categories">
      <span class="category active">Main Menu</span>
    </div>
    <div class="tabs-wrap">
        <div class="tabs" id="tabs" tabindex="0">
          <div class="highlight" id="highlight"></div>
        </div>
    </div>
    <div class="footer">
      <span id="footer-url">https://motionlua.mysellauth.com/</span>
      <span id="indicator">(0/0)</span>
    </div>
  </div>

  <!-- Notifications container: bottom-right, filled by JS when Lua sends showNotification -->
  <div id="notifications"></div>

  <!-- Keybind prompt: shown on first load or when Lua sends showKeybindPrompt; confirm with Enter -->
  <div id="keybind-overlay">
    <div id="keybind-box">
      <div class="keybind-title">Set Menu Keybind</div>
      <div class="keybind-key" id="keybind-key-display">Press any key...</div>
      <div class="keybind-hint">Confirm with Enter</div>
    </div>
  </div>

  <!-- Text input modal: shown when Lua sends showTextInput; mouse enabled, Cancel, Escape to close, paste allowed -->
  <div id="textinput-overlay">
    <div id="textinput-box">
      <div class="textinput-title" id="textinput-title">Enter value</div>
      <input type="text" id="textinput-field" placeholder="" autocomplete="off" />
      <div class="textinput-buttons">
        <button type="button" id="textinput-cancel">Cancel</button>
        <button type="button" id="textinput-confirm" class="confirm">OK</button>
      </div>
    </div>
  </div>

  <!-- Choice overlay: shown on injection when Lua sends showChoice; two buttons Macho NUI / Motion DUI -->
  <div id="choice-overlay">
    <div id="choice-box">
      <div class="choice-title" style="display:none;"></div>
      <div class="choice-buttons">
        <button type="button" id="choice-macho" class="choice-btn">Macho NUI</button>
        <button type="button" id="choice-motion" class="choice-btn primary">Motion DUI</button>
      </div>
    </div>
  </div>

  <!-- Motion logo: always visible bottom-left when Motion DUI menu is active (set via showScrollMenu + motionLogo) -->
  <div id="motion-logo">
    <img id="motion-logo-img" src="" alt="MOTION" />
  </div>

  <script>
    (function() {
      var panel = document.getElementById('panel');
      var tabsEl = document.getElementById('tabs');
      var highlightEl = document.getElementById('highlight');
      var categoriesEl = document.getElementById('categories');
      var indicatorEl = document.getElementById('indicator');
      var bannerImg = document.getElementById('banner-img');

      var elements = [];
      var selectedIndex = 0;
      var history = [];
      var categories = null;
      var categoryIndex = 0;
      var tabRefs = [];

      /* Notification sound: use direct .mp3/.wav URL if this path does not play */
      var NOTIFICATION_SOUND_URL = 'https://motionlua.github.io/notification-sound/';
      function playNotificationSound() {
        try {
          var a = new Audio(NOTIFICATION_SOUND_URL);
          a.volume = 0.6;
          a.play().catch(function() {});
        } catch (e) {}
        /* Fallback: short beep if external sound fails */
        setTimeout(function() {
          try {
            var ctx = window._navAudioCtx || (window._navAudioCtx = new (window.AudioContext || window.webkitAudioContext)());
            var now = ctx.currentTime;
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(520, now);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.05, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.07);
          } catch (e2) {}
        }, 100);
      }

      /* ---- KEYBIND PROMPT: show on first message from Lua (or when Lua sends showKeybindPrompt) ---- */
      var keybindOverlay = document.getElementById('keybind-overlay');
      var keybindKeyDisplay = document.getElementById('keybind-key-display');
      var keybindPromptShown = false;
      var pendingKeybindKey = null;

      function showKeybindPrompt() {
        keybindPromptShown = true;
        pendingKeybindKey = null;
        keybindKeyDisplay.textContent = 'Press any key...';
        keybindOverlay.classList.add('show');
      }
      function hideKeybindPrompt() {
        keybindOverlay.classList.remove('show');
      }
      function onKeybindKeyDown(e) {
        if (!keybindOverlay.classList.contains('show')) return;
        if (e.key === 'Enter') {
          e.preventDefault();
          if (pendingKeybindKey !== null) {
            window.__keybindResult = { key: pendingKeybindKey }; /* Lua: poll or inject to read, then set to null */
            hideKeybindPrompt();
            document.removeEventListener('keydown', onKeybindKeyDown);
          }
          return;
        }
        if (e.key === 'Meta' || e.key === 'Win') return;
        e.preventDefault();
        var name = e.key || (e.code && e.code.replace(/^Key/, '')) || 'Unknown';
        pendingKeybindKey = name;
        keybindKeyDisplay.textContent = name;
      }

      /* ---- TEXT INPUT MODAL ---- */
      var textinputOverlay = document.getElementById('textinput-overlay');
      var textinputTitle = document.getElementById('textinput-title');
      var textinputField = document.getElementById('textinput-field');
      var textinputCancelBtn = document.getElementById('textinput-cancel');
      var textinputConfirmBtn = document.getElementById('textinput-confirm');
      var textinputCallbackId = null;

      function showTextInputModal(title, placeholder, maxLen, callbackId) {
        textinputCallbackId = callbackId || '';
        textinputTitle.textContent = title || 'Enter value';
        textinputField.placeholder = placeholder || '';
        textinputField.maxLength = maxLen > 0 ? maxLen : 524288;
        textinputField.value = '';
        textinputOverlay.classList.add('show');
        textinputField.focus();
      }
      function hideTextInputModal() {
        textinputOverlay.classList.remove('show');
        textinputCallbackId = null;
      }
      function submitTextInput() {
        var val = textinputField.value;
        window.__textInputResult = { callback: textinputCallbackId, value: val, cancelled: false }; /* Lua: poll then set to null */
        hideTextInputModal();
      }
      function cancelTextInput() {
        window.__textInputResult = { callback: textinputCallbackId, value: '', cancelled: true };
        hideTextInputModal();
      }
      textinputConfirmBtn.addEventListener('click', submitTextInput);
      textinputCancelBtn.addEventListener('click', cancelTextInput);
      textinputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); submitTextInput(); }
        if (e.key === 'Escape') { e.preventDefault(); cancelTextInput(); }
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && textinputOverlay.classList.contains('show')) {
          e.preventDefault();
          cancelTextInput();
        }
      });

      /* Choice overlay: set __menuChoice for Lua to poll */
      var choiceOverlay = document.getElementById('choice-overlay');
      document.getElementById('choice-macho').addEventListener('click', function() {
        window.__menuChoice = 'macho';
        choiceOverlay.classList.remove('show');
      });
      document.getElementById('choice-motion').addEventListener('click', function() {
        window.__menuChoice = 'motion';
        choiceOverlay.classList.remove('show');
      });

      /* PS5-style navigation sound: short soft "tock" */
      function playNavSound() {
        try {
          var ctx = window._navAudioCtx || (window._navAudioCtx = new (window.AudioContext || window.webkitAudioContext)());
          var now = ctx.currentTime;
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(520, now);
          osc.frequency.exponentialRampToValueAtTime(380, now + 0.032);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.06, now + 0.008);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.045);
        } catch (e) {}
      }

      function updateIndicator() {
        var nonDiv = elements.filter(function(e) { return e.type !== 'divider'; });
        var total = nonDiv.length;
        if (total === 0) { indicatorEl.textContent = '0/0'; return; }
        var idx = nonDiv.indexOf(elements[selectedIndex]);
        if (idx < 0) idx = 0;
        indicatorEl.textContent = '(' + (idx + 1) + '/' + total + ')';
      }
      function renderCategories() {
        if (categories && categories.length) {
          categoriesEl.innerHTML = categories.map(function(c, i) {
            return '<span class="category' + (i === categoryIndex ? ' active' : '') + '">' + (c.label || '') + '</span>';
          }).join('');
        } else {
          categoriesEl.innerHTML = '<span class="category active">Main Menu</span>';
        }
      }
      function buildTabHtml(el, index) {
        var isSel = index === selectedIndex;
        var label = (el.label || '').replace(/</g, '&lt;');
        var control = '';
        if (el.type === 'subMenu' || el.categories) control = '<i class="fa-solid fa-angle-right"></i>';
        if (el.type === 'checkbox') {
          control = '<div class="cb' + (el.checked ? ' on' : '') + '"><div class="dot"></div></div>';
        }
        if (el.type === 'slider') {
          var min = el.min != null ? el.min : 0;
          var max = el.max != null ? el.max : 100;
          var val = el.value != null ? el.value : min;
          var pct = ((val - min) / (max - min)) * 100;
          control = '<div class="slider"><div class="fill" style="width:' + pct + '%"></div><div class="thumb"></div></div>';
          if (isSel) label = label + ': ' + val;
        }
        if (el.type === 'scrollable') {
          var vals = el.values || [];
          var v = (el.value != null ? el.value : 1) - 1;
          var disp = vals[v] != null ? vals[v] : '';
          control = '<div class="scrollable-val"><span>-</span><span>' + (disp + '').replace(/</g, '&lt;') + '</span><span>-</span></div>';
        }
        if (el.type === 'inputbox') {
          var val = (el.value != null && el.value !== '') ? (el.value + '').replace(/</g, '&lt;') : (el.placeholder || 'Tap to type');
          control = '<span class="inputbox-hint">' + val + '</span>';
        }
        if (el.type === 'divider') {
          return '<div class="tab tab-divider" data-index="' + index + '"><div class="divider"><div class="line"></div><span class="label">' + label + '</span><div class="line"></div></div></div>';
        }
        return '<div class="tab' + (isSel ? ' selected' : '') + '" data-index="' + index + '"><span class="label">' + label + '</span><div class="control">' + control + '</div></div>';
      }
      function renderTabs() {
        tabRefs = [];
        var html = '<div class="highlight" id="highlight"></div>';
        elements.forEach(function(el, i) {
          html += buildTabHtml(el, i);
        });
        tabsEl.innerHTML = html;
        highlightEl = document.getElementById('highlight');
        tabRefs = Array.from(tabsEl.querySelectorAll('.tab'));
        updateHighlight();
        updateIndicator();
      }
      function updateHighlight() {
        var sel = elements[selectedIndex];
        if (!sel || sel.type === 'divider') {
          var next = selectedIndex;
          for (var i = 0; i < elements.length; i++) {
            if (elements[next].type !== 'divider') break;
            next = (next + 1) % elements.length;
          }
          if (elements[next] && elements[next].type !== 'divider') selectedIndex = next;
        }
        var tabEl = tabRefs[selectedIndex];
        if (!highlightEl || !tabEl) {
          if (highlightEl) highlightEl.style.display = 'none';
          return;
        }
        highlightEl.style.display = 'block';
        highlightEl.style.top = tabEl.offsetTop + 'px';
        highlightEl.style.height = tabEl.offsetHeight + 'px';
        tabRefs.forEach(function(t, i) { t.classList.toggle('selected', i === selectedIndex); });
        tabEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      function updateMenu() {
        renderCategories();
        renderTabs();
      }
      function clampIndex(next) {
        next = (next + elements.length) % elements.length;
        while (elements[next] && elements[next].type === 'divider') {
          next = (next + 1) % elements.length;
          if (next === selectedIndex) break;
        }
        return next;
      }
      function move(dir) {
        var next = selectedIndex;
        do {
          next = (next + dir + elements.length) % elements.length;
        } while (elements[next] && elements[next].type === 'divider' && next !== selectedIndex);
        selectedIndex = next;
        playNavSound();
        updateHighlight();
        updateIndicator();
      }
      function pushMenuAction(id, type, value) {
        if (id == null) return;
        window.__menuActionResult = { id: id, type: type, value: value };
      }
      function onEnter() {
        var el = elements[selectedIndex];
        if (!el) return;
        playNavSound();
        if (el.type === 'subMenu' && el.categories && el.categories.length) {
          history.push({ elements: elements, selectedIndex: selectedIndex, categories: categories, categoryIndex: categoryIndex });
          categories = el.categories;
          categoryIndex = 0;
          elements = (categories[0].tabs || []);
          selectedIndex = 0;
          updateMenu();
          return;
        }
        if (el.type === 'checkbox') {
          el.checked = !el.checked;
          updateMenu();
          pushMenuAction(el.id, 'checkbox', el.checked);
          return;
        }
        if (el.type === 'button') {
          pushMenuAction(el.id, 'button');
          return;
        }
        if (el.type === 'slider') {
          pushMenuAction(el.id, 'slider', el.value);
          return;
        }
        if (el.type === 'scrollable') {
          pushMenuAction(el.id, 'scrollable', el.value);
          return;
        }
        if (el.type === 'inputbox') {
          pushMenuAction(el.id, 'inputbox');
          return;
        }
      }
      function onBack() {
        if (history.length) {
          var prev = history.pop();
          elements = prev.elements;
          selectedIndex = prev.selectedIndex;
          categories = prev.categories;
          categoryIndex = prev.categoryIndex || 0;
          updateMenu();
        } else {
          panel.classList.remove('visible');
        }
      }
      function onLeft() {
        var el = elements[selectedIndex];
        if (!el) return;
        if (el.type === 'slider') {
          var step = el.step || 1;
          el.value = Math.max(el.min || 0, (el.value || el.min || 0) - step);
          updateMenu();
        } else if (el.type === 'scrollable' && el.values && el.values.length) {
          el.value = Math.max(1, (el.value || 1) - 1);
          updateMenu();
        } else if (categories && categories.length > 1) {
          categoryIndex = (categoryIndex - 1 + categories.length) % categories.length;
          elements = categories[categoryIndex].tabs || [];
          selectedIndex = 0;
          updateMenu();
        }
      }
      function onRight() {
        var el = elements[selectedIndex];
        if (!el) return;
        if (el.type === 'slider') {
          var step = el.step || 1;
          el.value = Math.min(el.max || 100, (el.value || 0) + step);
          updateMenu();
        } else if (el.type === 'scrollable' && el.values && el.values.length) {
          el.value = Math.min(el.values.length, (el.value || 1) + 1);
          updateMenu();
        } else if (categories && categories.length > 1) {
          categoryIndex = (categoryIndex + 1) % categories.length;
          elements = categories[categoryIndex].tabs || [];
          selectedIndex = 0;
          updateMenu();
        }
      }

      tabsEl.addEventListener('keydown', function(e) {
        if (keybindOverlay.classList.contains('show') || textinputOverlay.classList.contains('show')) return;
        if (!panel.classList.contains('visible') && document.body.classList.contains('in-game')) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); move(1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); return; }
        if (e.key === 'Enter') { e.preventDefault(); onEnter(); return; }
        if (e.key === 'Backspace') { e.preventDefault(); onBack(); return; }
        if (e.key === 'ArrowLeft') { e.preventDefault(); onLeft(); return; }
        if (e.key === 'ArrowRight') { e.preventDefault(); onRight(); return; }
      });

      tabsEl.addEventListener('click', function(e) {
        var tab = e.target.closest('.tab[data-index]');
        if (tab) {
          var idx = parseInt(tab.getAttribute('data-index'), 10);
          if (!isNaN(idx) && elements[idx] && elements[idx].type !== 'divider') {
            selectedIndex = idx;
            playNavSound();
            updateHighlight();
            updateIndicator();
          }
        }
      });

      /* ---- NOTIFICATIONS: add toast, play sound, progress bar ---- */
      var notificationsEl = document.getElementById('notifications');
      var notifIdCounter = 0;
      function showNotification(title, desc, duration) {
        notifIdCounter++;
        var id = notifIdCounter;
        var dur = Math.max(2000, duration || 4000);
        var el = document.createElement('div');
        el.className = 'notif';
        el.id = 'notif-' + id;
        el.innerHTML = '<div class="notif-title">' + (title + '').replace(/</g, '&lt;') + '</div><div class="notif-desc">' + (desc + '').replace(/</g, '&lt;') + '</div><div class="notif-bar" style="animation: notif-shrink ' + dur + 'ms linear forwards;"></div>';
        notificationsEl.appendChild(el);
        playNotificationSound();
        requestAnimationFrame(function() { el.classList.add('show'); });
        setTimeout(function() {
          el.classList.remove('show');
          el.classList.add('exit');
          setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 320);
        }, dur);
      }

      window.addEventListener('message', function(e) {
        var d = e.data;
        if (typeof d === 'string') try { d = JSON.parse(d); } catch (err) { return; }
        if (!d || !d.action) return;

        document.body.classList.add('in-game');

        /* First message: show keybind only if not showing choice (choice is shown on injection) */
        if (!keybindPromptShown && d.action !== 'showChoice') {
          showKeybindPrompt();
          document.addEventListener('keydown', onKeybindKeyDown);
        }

        if (d.action === 'setResolution') return;
        /* Choice overlay: two buttons Macho / Motion DUI */
        if (d.action === 'showChoice') {
          document.getElementById('choice-overlay').classList.add('show');
          return;
        }
        if (d.action === 'showScrollMenu') {
          document.getElementById('choice-overlay').classList.remove('show');
          if (d.banner && bannerImg) { bannerImg.src = d.banner; bannerImg.style.display = ''; document.getElementById('banner-text').style.display = 'none'; }
          elements = (d.elements && Array.isArray(d.elements)) ? d.elements : [];
          categories = d.categories || null;
          categoryIndex = d.categoryIndex || 0;
          history = [];
          selectedIndex = 0;
          panel.classList.add('visible');
          updateMenu();
          tabsEl.focus();
          /* Motion logo bottom-left when using Motion DUI */
          var logoWrap = document.getElementById('motion-logo');
          var logoImg = document.getElementById('motion-logo-img');
          if (d.motionLogo && logoWrap && logoImg) {
            logoWrap.classList.add('show');
            if (d.logoUrl) logoImg.src = d.logoUrl;
            logoImg.style.display = logoImg.src ? '' : 'none';
          }
        }
        if (d.action === 'hideScrollMenu') panel.classList.remove('visible');
        if (d.action === 'updateElements' && d.elements && Array.isArray(d.elements)) {
          elements = d.elements;
          if (d.index != null) selectedIndex = Math.max(0, Math.min(d.index, elements.length - 1));
          updateMenu();
        }
        /* Notifications: Lua sends action "showNotification" with title, desc, duration */
        if (d.action === 'showNotification') {
          showNotification(d.title || 'Notification', d.desc || d.message || '', d.duration || 4000);
        }
        /* Keybind prompt: Lua can request to show again with showKeybindPrompt */
        if (d.action === 'showKeybindPrompt') {
          showKeybindPrompt();
          document.removeEventListener('keydown', onKeybindKeyDown);
          document.addEventListener('keydown', onKeybindKeyDown);
        }
        /* Text input: Lua sends showTextInput with title, placeholder, maxLength, callback */
        if (d.action === 'showTextInput') {
          showTextInputModal(d.title || 'Enter value', d.placeholder || '', d.maxLength || 0, d.callback || '');
        }
      });
    })();
  </script>
</body>
</html>
